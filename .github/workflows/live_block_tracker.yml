name: Live Block Tracker

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: birdnest-live-block-tracker
  cancel-in-progress: false

jobs:
  run-live-block-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install chromium --with-deps

      - name: Run live block tracker
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_SUBJECT_PREFIX: Live Block Alert
          BATCH_SIZE: 20
          MONTHS_TO_COLLECT: 6
        run: |
          python birdnest_live_block_tracker.py

      - name: Commit updated baseline and history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/ reports/
          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "Update live blocked dates tracker"

          git pull --rebase origin main
          git push origin main
